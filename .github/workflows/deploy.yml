name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      admin: ${{ steps.filter.outputs.admin }}
      mobile: ${{ steps.filter.outputs.mobile }}
      any_deploy: ${{ steps.filter.outputs.backend == 'true' || steps.filter.outputs.admin == 'true' || steps.filter.outputs.mobile == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # NOTE: If you add a new workspace under packages/, add it to the
          # relevant filter sets below so changes to it trigger deploys.
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/contracts/**'
              - 'package.json'
              - 'package-lock.json'
              - '.nvmrc'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/pr-checks.yml'
            admin:
              - 'apps/admin/**'
              - 'packages/contracts/**'
              - 'package.json'
              - 'package-lock.json'
              - '.nvmrc'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/pr-checks.yml'
            mobile:
              - 'apps/mobile/**'
              - 'packages/contracts/**'
              - 'package.json'
              - 'package-lock.json'
              - '.nvmrc'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/pr-checks.yml'

  wait-for-checks:
    name: Wait for PR checks
    needs: detect-changes
    if: needs.detect-changes.outputs.any_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Wait for required checks to pass
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          running-workflow-name: 'Wait for PR checks'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          allowed-conclusions: success

  deploy-backend:
    name: Deploy backend to Vercel
    needs: [detect-changes, wait-for-checks]
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-admin:
    name: Deploy admin to Vercel
    needs: [detect-changes, wait-for-checks]
    if: needs.detect-changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  eas-update:
    name: EAS Update (OTA)
    needs: [detect-changes, wait-for-checks]
    if: needs.detect-changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        run: eas update --channel production --platform all --message "deploy ${GITHUB_SHA::8}" --non-interactive
        working-directory: apps/mobile
