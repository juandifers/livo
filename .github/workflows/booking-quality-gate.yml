name: booking-quality-gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: fe-booking-quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile-booking-integration:
    name: mobile-booking-integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run mobile booking integration tests
        run: npm run test:booking

  date-contract-matrix:
    name: date-contract-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run date contract tests in timezone matrix
        run: |
          set -euo pipefail
          for TZ in UTC America/Bogota America/Los_Angeles Europe/Madrid Pacific/Auckland; do
            echo "Running date contract tests in $TZ"
            TZ="$TZ" npm run test:date:contract
          done

  deploy-mobile:
    name: deploy-mobile
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - mobile-booking-integration
      - date-contract-matrix
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate Expo deploy secret
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          [ -n "$EXPO_TOKEN" ] || (echo "Missing secret: EXPO_TOKEN" && exit 1)
      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Publish production OTA update
        run: eas update --channel production --platform all --message "booking-gate deploy ${GITHUB_SHA}" --non-interactive
