<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Livo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1E4640 0%, #2a5a54 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo h1 {
            color: #1E4640;
            font-size: 32px;
            font-weight: bold;
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #333;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #1E4640;
        }

        .helper {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
        }

        .button {
            width: 100%;
            background: #1E4640;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .button:hover {
            background: #2a5a54;
        }

        .button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1E4640;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Livo</h1>
        </div>

        <div id="resetForm">
            <h2>Reset Your Password</h2>

            <form id="passwordForm">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" required minlength="6">
                    <div class="helper">Password must be at least 6 characters long</div>
                    <div id="passwordError" class="error"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6">
                    <div id="confirmPasswordError" class="error"></div>
                </div>

                <button type="submit" class="button" id="submitBtn">Reset Password</button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    Resetting your password...
                </div>
            </form>
        </div>

        <div id="successMessage" style="display: none;">
            <div class="success">
                <h3>Password Reset Complete</h3>
                <p>Your password has been updated successfully. You can now sign in with your new password.</p>
            </div>
        </div>

        <div id="errorMessage" style="display: none;">
            <div class="error-message">
                <h3>Reset Failed</h3>
                <p id="errorText"></p>
                <button class="button" onclick="retryReset()" style="margin-top: 20px;">Try Again</button>
            </div>
        </div>

        <div class="footer">
            <p>This link is valid for 10 minutes</p>
            <p>&copy; 2024 Livo. All rights reserved.</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pathToken = window.location.pathname.split('/').pop();
        const token = urlParams.get('token') || (pathToken !== 'reset-password.html' ? pathToken : '');
        const resetForm = document.getElementById('resetForm');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');

        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            clearFieldErrors();

            if (password.length < 6) {
                showFieldError('password', 'Password must be at least 6 characters long');
                return;
            }

            if (password !== confirmPassword) {
                showFieldError('confirmPassword', 'Passwords do not match');
                return;
            }

            showLoading(true);

            try {
                const response = await fetch(`/api/auth/reset-password/${encodeURIComponent(token)}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        password: password,
                        confirmPassword: confirmPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    resetForm.style.display = 'none';
                    errorMessage.style.display = 'none';
                    successMessage.style.display = 'block';
                } else {
                    showGlobalError(data.error || 'Password reset failed. Please request a new link.');
                }
            } catch (err) {
                showGlobalError('Network error. Please check your connection and try again.');
            } finally {
                showLoading(false);
            }
        });

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('submitBtn').disabled = show;
        }

        function clearFieldErrors() {
            document.getElementById('passwordError').textContent = '';
            document.getElementById('confirmPasswordError').textContent = '';
        }

        function showFieldError(field, message) {
            const target = document.getElementById(field + 'Error');
            if (target) target.textContent = message;
        }

        function showGlobalError(message) {
            document.getElementById('errorText').textContent = message;
            resetForm.style.display = 'none';
            successMessage.style.display = 'none';
            errorMessage.style.display = 'block';
        }

        function retryReset() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            resetForm.style.display = 'block';
            clearFieldErrors();
        }

        async function verifyToken() {
            if (!token) {
                showGlobalError('Invalid reset link. Please request a new password reset email.');
                return;
            }

            try {
                const response = await fetch(`/api/auth/reset-password/${encodeURIComponent(token)}/verify`);
                const data = await response.json();
                if (!response.ok || !data.success) {
                    showGlobalError(data.error || 'This password reset link is invalid or expired.');
                }
            } catch (err) {
                showGlobalError('Could not verify this reset link right now. Please try again.');
            }
        }

        verifyToken();
    </script>
</body>
</html>
