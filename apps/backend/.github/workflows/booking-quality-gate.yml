name: booking-quality-gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - backend-release-v*
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Where to deploy the backend"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: be-booking-quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rule-traceability:
    name: rule-traceability
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Verify canonical rule traceability tags
        run: npm run test:rules:traceability

  backend-booking-rules:
    name: backend-booking-rules
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MONGO_URI: mongodb://127.0.0.1:27017/livo_booking_gate_ci
      MONGODB_URI: mongodb://127.0.0.1:27017/livo_booking_gate_ci
      JWT_SECRET: booking-gate-ci-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Run backend booking rule tests
        run: npm run test:rules

  date-contract-matrix:
    name: date-contract-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MONGO_URI: mongodb://127.0.0.1:27017/livo_booking_gate_ci
      MONGODB_URI: mongodb://127.0.0.1:27017/livo_booking_gate_ci
      JWT_SECRET: booking-gate-ci-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Run date contract tests in timezone matrix
        run: |
          set -euo pipefail
          for TZ in UTC America/Bogota America/Los_Angeles Europe/Madrid Pacific/Auckland; do
            echo "Running date contract tests in $TZ"
            TZ="$TZ" npm run test:date:contract
          done

  deploy-backend-staging:
    name: deploy-backend-staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - rule-traceability
      - backend-booking-rules
      - date-contract-matrix
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'staging')
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate deploy secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          [ -n "$VERCEL_TOKEN" ] || (echo "Missing secret: VERCEL_TOKEN" && exit 1)
          [ -n "$VERCEL_ORG_ID" ] || (echo "Missing secret: VERCEL_ORG_ID" && exit 1)
          [ -n "$VERCEL_PROJECT_ID" ] || (echo "Missing secret: VERCEL_PROJECT_ID" && exit 1)
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
      - name: Deploy backend to Vercel (staging)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --yes --token="$VERCEL_TOKEN"

  deploy-backend-production:
    name: deploy-backend-production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - rule-traceability
      - backend-booking-rules
      - date-contract-matrix
    if: |
      startsWith(github.ref, 'refs/tags/backend-release-v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'production')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate deploy secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          [ -n "$VERCEL_TOKEN" ] || (echo "Missing secret: VERCEL_TOKEN" && exit 1)
          [ -n "$VERCEL_ORG_ID" ] || (echo "Missing secret: VERCEL_ORG_ID" && exit 1)
          [ -n "$VERCEL_PROJECT_ID" ] || (echo "Missing secret: VERCEL_PROJECT_ID" && exit 1)
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Deploy backend to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
