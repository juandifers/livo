<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Setup - Livo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1E4640 0%, #2a5a54 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #1E4640;
            font-size: 32px;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #1E4640;
        }
        
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .button {
            width: 100%;
            background: #1E4640;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        
        .button:hover {
            background: #2a5a54;
        }
        
        .button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1E4640;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 14px;
        }
        
        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Livo</h1>
        </div>
        
        <div id="setupForm">
            <h2 style="text-align: center; margin-bottom: 30px; color: #333;">Complete Your Account Setup</h2>
            
            <form id="passwordForm">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="6">
                    <div class="password-requirements">Password must be at least 6 characters long</div>
                    <div id="passwordError" class="error"></div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6">
                    <div id="confirmPasswordError" class="error"></div>
                </div>
                
                <button type="submit" class="button" id="submitBtn">Complete Setup</button>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    Setting up your account...
                </div>
            </form>
        </div>
        
        <div id="successMessage" style="display: none;">
            <div class="success">
                <h3>Account Setup Complete!</h3>
                <p>Your account has been successfully set up. You can now log in to the Livo app.</p>
                <button class="button" onclick="openApp()" style="margin-top: 20px;">Open Livo App</button>
            </div>
        </div>
        
        <div id="errorMessage" style="display: none;">
            <div class="error-message">
                <h3>Setup Failed</h3>
                <p id="errorText"></p>
                <button class="button" onclick="retrySetup()" style="margin-top: 20px;">Try Again</button>
            </div>
        </div>
        
        <div class="footer">
            <p>This link is valid for 24 hours</p>
            <p>&copy; 2024 Livo. All rights reserved.</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pathToken = window.location.pathname.split('/').pop();
        const token = urlParams.get('token') || (pathToken !== 'account-setup.html' ? pathToken : '');
        const setupForm = document.getElementById('setupForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            clearFieldErrors();

            if (password.length < 6) {
                showFieldError('password', 'Password must be at least 6 characters long');
                return;
            }

            if (password !== confirmPassword) {
                showFieldError('confirmPassword', 'Passwords do not match');
                return;
            }

            showLoading(true);

            try {
                const response = await fetch(`/api/auth/account-setup/${encodeURIComponent(token)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        password: password,
                        confirmPassword: confirmPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess();
                } else {
                    showGlobalError(data.error || 'Account setup failed. Please request a new setup email.');
                }
            } catch (error) {
                console.error('Setup error:', error);
                showGlobalError('Network error. Please check your connection and try again.');
            } finally {
                showLoading(false);
            }
        });

        function clearFieldErrors() {
            document.getElementById('passwordError').textContent = '';
            document.getElementById('confirmPasswordError').textContent = '';
        }

        function showFieldError(field, message) {
            const target = document.getElementById(field + 'Error');
            if (target) target.textContent = message;
        }

        function showGlobalError(message) {
            document.getElementById('errorText').textContent = message;
            setupForm.style.display = 'none';
            successMessage.style.display = 'none';
            errorMessage.style.display = 'block';
        }

        function showSuccess() {
            setupForm.style.display = 'none';
            errorMessage.style.display = 'none';
            successMessage.style.display = 'block';
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('submitBtn').disabled = show;
        }

        function openApp() {
            const appUrl = 'livo://account-setup-complete';
            window.location.href = appUrl;
            setTimeout(() => {
                alert('Account setup is complete. Open the Livo app and sign in with your email and new password.');
            }, 1000);
        }

        function retrySetup() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            setupForm.style.display = 'block';
            clearFieldErrors();
        }

        async function verifyToken() {
            if (!token) {
                showGlobalError('Invalid setup link. Please check your email for the latest account setup link.');
                return;
            }

            try {
                const response = await fetch(`/api/auth/account-setup/${encodeURIComponent(token)}/verify`);
                const data = await response.json();
                if (!response.ok || !data.success) {
                    showGlobalError(data.error || 'This setup link is invalid or expired. Please request a new invitation.');
                }
            } catch (err) {
                showGlobalError('Could not verify your setup link right now. Please try again in a moment.');
            }
        }

        verifyToken();
    </script>
</body>
</html>
